<div class="container mt-5">
  <div class="row">
    <h1 class="main-title">Shopping</h1>

    <!-- Sidebar -->
    <section class="col-md-3">
      <div class="sidebar">
        <!-- Sorting -->
        <h4 class="section-title">Sorting</h4>
        <div class="custom-select-wrapper mb-4">
          <select class="form-select" (change)="SortPrice($event)">
          <option *ngFor="let i of Price" [value]="i.value">{{i.Name}}</option>
          </select>
        </div>

        <!-- Categories -->
        <h4 class="section-title">Categories</h4>
        <ul class="list-group custom-list-group">
          @for (item of Categories; track $index) {
            <li [class.active]="CategoryId === item.id" (click)="selectedIds(item.id)" class="list-group-item custom-list-item">{{item.name}}</li>
          }
          
        </ul>
      </div>
    </section>

    <!-- Products Section -->
    <section class="col-md-9">
      <!-- Top Bar -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="paging-container">
          <span class="text-dark">Showing 6 of 24</span>
        </div>

        <div class="search-container">
          <div class="input-group search-bar">
            <input type="text" class="form-control" placeholder="Search..." />
            <input type="button" class="btn btn-danger" value="Search" />
            <input type="button" class="btn btn-dark" value="Reset" />
          </div>
        </div>
      </div>
      <div class="row">
    @for (item of Products; track $index) {
       <app-shop-item  [product]="item" class="col-md-4"></app-shop-item>
    }
  </div>
      <!-- Pagination -->
      <div class="d-flex justify-content-center mt-4">
        <nav>
          <ul class="pagination">
            <li class="page-item">
              <a class="page-link" href="#">Previous</a>
            </li>
            <li class="page-item active">
              <a class="page-link" href="#">1</a>
            </li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" href="#">Next</a></li>
          </ul>
        </nav>
      </div>
    </section>
  </div>
</div>
